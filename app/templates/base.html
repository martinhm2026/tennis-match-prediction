<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Mi Aplicación</title>
  <style>
    /* Reseteo completo de márgenes y padding + fondo gris oscuro */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #1a1a1a;       /* plomo muy oscuro */
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;                     /* texto blanco por defecto */
    }

    /* Barra superior centrada */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #48b30a;
      height: 60px;
    }
    .footer-bar {
      background-color: #48b30a;
      color: #fff;
      text-align: center;
      padding: 12px 0;
      font-weight: bold;
      margin-top: 40px;
    }
    .navbar .logo {
      height: 50px;
      margin-right: 30px;
    }
    .navbar a {
      margin: 0 15px;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      position: relative;
      padding: 5px 0;
      transition: border-bottom 150ms;
    }
    .navbar a.active,
    .navbar a:hover {
      border-bottom: 2px solid #fff;
    }

    /* Contenido sin espacios laterales */
    .content {
      padding: 2px 0;  /* sólo arriba y abajo */
    }
  </style>
</head>
<body>
  <div class="navbar">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="logo" class="logo">
    <a href="{{ url_for('inicio') }}" class="{% if request.path == url_for('inicio') %}active{% endif %}">Inicio</a>
    <a href="{{ url_for('prediccion') }}" class="{% if request.path == url_for('prediccion') %}active{% endif %}">Predicción</a>
    <a href="{{ url_for('ranking') }}" class="{% if request.path == url_for('ranking') %}active{% endif %}">Ranking</a>
    <a href="{{ url_for('Individual') }}" class="{% if request.path == url_for('Individual') %}active{% endif %}">Análisis Individual</a>
  </div>

  <div class="content">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
