{% extends "base.html" %}

{% block content %}
  <style>
    /* Bloque fijo para tríptico con 5 imágenes */
    .triptych-block {
      width: 100%;
      max-width: 1800px;
      height: 500px;
      margin: 30px auto;
      position: relative;
      overflow: hidden;
    }
    .triptych {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      width: 100%;
      height: 100%;
    }
    .triptych img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
    }

    /* Degradado y texto en la zona inferior de las 5 fotos */
    .triptych-block .bottom-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 130px;
      background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.5rem;
      text-align: center;
      pointer-events: none;
    }

    h1 {
      text-align: center;
      color: #eee;
      margin: 20px 0;
    }

    .prediccion-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    /* Panel de selección */
    .selection-panel {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      margin: 20px 0;
    }
    .player-select {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .avatar-frame {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 10px;
    }
    .avatar { width:100%; height:100%; object-fit:cover; border:4px solid #48b30a; border-radius:50%; }
    .flag { position:absolute; bottom:0; right:0; width:40px; height:24px; border:1px solid #fff; border-radius:2px; }
    select {
      background-color: #2a2a2a;
      color: #eee;
      padding: 8px;
      border: 1px solid #555;
      border-radius: 4px;
      min-width: 200px;
      font-size: 1rem;
    }
    #simulate-btn {
      background-color: #48b30a;
      color: #fff;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .footer-bar {
      background-color: #48b30a;
      color: #fff;
      text-align: center;
      padding: 12px 0;
      font-weight: bold;
      margin-top: 40px;
    }

    /* Tabla de resultados */
    .result-table table {
      width: 90%;
      margin: 20px auto;
      border-collapse: collapse;
    }
    .result-table th, .result-table td {
      border: 1px solid #555;
      padding: 10px;
      color: #eee;
      text-align: center;
    }
    .result-table th { background-color: #333; }
  </style>

  <!-- Tríptico de 5 imágenes -->
  <section class="triptych-block">
    <div class="triptych">
      <img src="{{ url_for('static', filename='1.jpg') }}" alt="Imagen 1">
      <img src="{{ url_for('static', filename='2.jpg') }}" alt="Imagen 2">
      <img src="{{ url_for('static', filename='3.jpg') }}" alt="Imagen 3">
      <img src="{{ url_for('static', filename='4.jpg') }}" alt="Imagen 4">
      <img src="{{ url_for('static', filename='5.jpg') }}" alt="Imagen 5">
    </div>
    <div class="bottom-overlay">
      Toma la mejor decisión: Simula el resultado entre dos jugadoras,
      y descubre cuál es la mejor opción.
    </div>
  </section>

  <h1>Predicción</h1>

  <div class="prediccion-container">
    <div class="selection-panel">
      <!-- Jugadora 1 -->
      <div class="player-select">
        <div class="avatar-frame">
          <img id="avatar1" class="avatar" src="{{ url_for('static', filename='icono.png') }}" alt="Avatar Jugadora 1">
          <img id="flag1" class="flag" src="{{ url_for('static', filename='chile.png') }}" alt="Bandera Jugadora 1">
        </div>
        <select id="player1-select">
          {% for player in players %}
          <option value="{{ player.name }}" data-img="{{ player.value }}" data-country="{{ player.country }}">{{ player.name }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Botón Simular -->
      <button type="button" id="simulate-btn">Simular</button>

      <!-- Jugadora 2 -->
      <div class="player-select">
        <div class="avatar-frame">
          <img id="avatar2" class="avatar" src="{{ url_for('static', filename='icono.png') }}" alt="Avatar Jugadora 2">
          <img id="flag2" class="flag" src="{{ url_for('static', filename='chile.png') }}" alt="Bandera Jugadora 2">
        </div>
        <select id="player2-select">
          {% for player in players %}
          <option value="{{ player.name }}" data-img="{{ player.value }}" data-country="{{ player.country }}">{{ player.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Tabla de resultados -->
    <div class="result-table">
      <table>
        <thead>
          <tr>
            <th>Modelo</th>
            <th>Ganadora</th>
            <th>Accuracy</th>
            <th>Precision</th>
            <th>Recall</th>
            <th>F1-Score</th>
            <th>ROC AUC</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
      <p id="winner" style="text-align:center; color:#eee; margin-top:20px;"></p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const base = "{{ url_for('static', filename='') }}";
      const p1 = document.getElementById('player1-select');
      const p2 = document.getElementById('player2-select');
      const avatar1 = document.getElementById('avatar1');
      const flag1   = document.getElementById('flag1');
      const avatar2 = document.getElementById('avatar2');
      const flag2   = document.getElementById('flag2');
      const btn = document.getElementById('simulate-btn');
      const tbody = document.getElementById('results-body');
      const winnerText = document.getElementById('winner');

      function update(el, avatarEl, flagEl) {
        const opt = el.options[el.selectedIndex];
        avatarEl.src = `${base}${opt.dataset.img}.png`;
        flagEl.src   = `${base}${opt.dataset.country}.png`;
      }
      p1.addEventListener('change', () => update(p1, avatar1, flag1));
      p2.addEventListener('change', () => update(p2, avatar2, flag2));
      update(p1, avatar1, flag1);
      update(p2, avatar2, flag2);

      btn.addEventListener('click', async () => {
        const j1 = p1.value;
        const j2 = p2.value;
        tbody.innerHTML = '';
        winnerText.textContent = '';
        try {
          const resp = await fetch('/simular', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ jugadora1: j1, jugadora2: j2 })
          });
          const data = await resp.json();
          if (!resp.ok) { alert(data.error); return; }
          data.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${r.Modelo}</td>
              <td>${r.Ganadora_Predicha}</td>
              <td>${r.Accuracy}%</td>
              <td>${r.Precision}%</td>
              <td>${r.Recall}%</td>
              <td>${r['F1-Score']}%</td>
              <td>${r['ROC AUC']}%</td>
            `;
            tbody.appendChild(tr);
          });
          const votes = data.map(r=>r.Ganadora_Predicha);
          const winner = Object.entries(votes.reduce((acc,v)=>{ acc[v]=(acc[v]||0)+1; return acc; },{}))
            .sort((a,b)=>b[1]-a[1])[0][0];
          winnerText.textContent = `🏆 Ganadora por mayoría: ${winner}`;
        } catch(e) { alert('No se pudo conectar.'); }
      });
    });
  </script>

  <div class="footer-bar">
    Para más información al +569133
  </div>
{% endblock %}
